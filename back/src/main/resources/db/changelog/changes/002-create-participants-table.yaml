databaseChangeLog:
  - changeSet:
      id: 002-create-participants-table
      author: videoconf
      changes:
        - createTable:
            tableName: participants
            columns:
              - column:
                  name: id
                  type: bigint
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: room_id
                  type: bigint
                  constraints:
                    nullable: false
              - column:
                  name: username
                  type: varchar(255)
                  constraints:
                    nullable: false
              - column:
                  name: keycloak_user_id
                  type: varchar(255)
              - column:
                  name: joined_at
                  type: timestamp
                  defaultValueComputed: CURRENT_TIMESTAMP
              - column:
                  name: left_at
                  type: timestamp
        - addForeignKeyConstraint:
            baseTableName: participants
            baseColumnNames: room_id
            referencedTableName: rooms
            referencedColumnNames: id
            constraintName: fk_participants_room
