log_format downloads '$remote_addr - [$time_local] '
                     '"$request" $status $body_bytes_sent '
                     'sent=$bytes_sent rt=$request_time '
                     'ref="$http_referer" ua="$http_user_agent"';

server {
    listen 80 default_server;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;

    access_log /var/log/nginx/access.log downloads;
    error_log /var/log/nginx/error.log notice;

    location /downloads/ {
        alias /data/public/;
        disable_symlinks off;
        add_header Content-Disposition "attachment" always;
    }

    location / {
        return 404;
    }
}
