server {
    listen 80;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    root /usr/share/nginx/html;
    index index.html;

    ssl_certificate /etc/nginx/ssl/selfsigned.crt;
    ssl_certificate_key /etc/nginx/ssl/selfsigned.key;

    # --- Large file serving optimizations ---
    # sendfile: kernel-level file-to-socket transfer, bypasses userspace copying
    sendfile on;
    # tcp_nopush: send HTTP headers and file data in one TCP packet (works with sendfile)
    tcp_nopush on;
    tcp_nodelay on;

    # --- X-Accel-Redirect: internal file serving location ---
    # "internal" means direct client requests to /protected/ return 404.
    # Only X-Accel-Redirect from the backend can trigger this location.
    # The alias maps the URI to the shared Docker volume with files.
    # Example: X-Accel-Redirect: /protected/docs/report.pdf
    #          → Nginx serves /data/files/docs/report.pdf from disk
    location /protected/ {
        internal;
        alias /data/files/;

        # Disable access log for file serving to avoid leaking filenames
        access_log off;
    }

    # --- File download endpoint: separate location for download-specific proxy settings ---
    # Exact match (=) takes priority over the prefix /api/ location below.
    # Backend returns only headers (~200 bytes), Nginx serves file via X-Accel-Redirect.
    location = /api/files/download {
        proxy_pass http://host.docker.internal:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Disable buffering: backend response is tiny (just headers),
        # and the file from X-Accel-Redirect can be up to 2GB.
        proxy_buffering off;
        proxy_max_temp_file_size 0;

        # Raise read timeout: backend may take time to validate permissions
        proxy_read_timeout 30s;
    }

    location /api/ {
        client_max_body_size 2048m;
        proxy_pass http://host.docker.internal:8080/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /ws/ {
        proxy_pass http://host.docker.internal:8080/ws/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }

    location /auth/ {
        proxy_pass http://host.docker.internal:8181/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_buffer_size 128k;
        proxy_buffers 4 256k;
        proxy_busy_buffers_size 256k;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
