services:
  front:
    build:
      context: ./front
      args:
        VITE_KEYCLOAK_URL: ${VITE_KEYCLOAK_URL}
    ports:
      - "443:443"
      - "80:80"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./certs/selfsigned.crt:/etc/nginx/ssl/selfsigned.crt:ro
      - ./certs/selfsigned.key:/etc/nginx/ssl/selfsigned.key:ro
    depends_on:
      - download-nginx

  download-nginx:
    image: nginx:alpine
    volumes:
      - ./front/nginx-downloads.conf:/etc/nginx/conf.d/default.conf:ro
      - ./files:/data/files:ro
      - ./public-files:/data/public:ro
